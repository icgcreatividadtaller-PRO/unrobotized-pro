<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnRobotized Pro | Refined v3.8</title>
    
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="icon" type="image/png" href="/icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; min-height: 100vh; overflow-x: hidden; display: flex; justify-content: center; align-items: center; padding: 2rem 1rem; }
        
        .halftone-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; background-image: radial-gradient(circle, #0ea5e9 1.5px, transparent 1.5px); background-size: 14px 14px; mask-image: radial-gradient(circle at bottom right, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%); -webkit-mask-image: radial-gradient(circle at bottom right, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%); opacity: 0.25; }

        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 1); position: relative; z-index: 20; display: flex; flex-direction: column; }

        /* AJUSTE 5: Tipografía de botones a 10pt (approx 13px) */
        .ps-button { 
            border-top: 3px solid rgba(255, 255, 255, 0.25); border-left: 3px solid rgba(255, 255, 255, 0.25); 
            border-right: 3px solid rgba(0, 0, 0, 0.5); border-bottom: 3px solid rgba(0, 0, 0, 0.5); 
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.5); transition: all 0.2s ease; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; 
            font-size: 13px; font-weight: 800; text-transform: uppercase; color: #f1f5f9; 
        }
        .ps-button:active { border-top: 3px solid rgba(0, 0, 0, 0.5); border-left: 3px solid rgba(0, 0, 0, 0.5); transform: scale(0.98); }
        .ps-button-active { background-color: #0ea5e9 !important; color: #020617 !important; box-shadow: 0 0 30px rgba(14, 165, 233, 0.5); }
        
        .icon-svg { width: 1.2rem; height: 1.2rem; stroke-width: 2.5; }

        .neon-box { background: rgba(2, 6, 23, 0.8); border: 1px solid rgba(14, 165, 233, 0.4); box-shadow: 0 0 30px rgba(14, 165, 233, 0.2); border-radius: 1.5rem; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        
        /* AJUSTE 5: Label Misil Generado a 10pt */
        .box-title { text-align: center; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; color: #0ea5e9; padding: 1.5rem 1.5rem 1rem 1.5rem; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }

        #misiones_list { display: flex; flex-direction: column; gap: 0.75rem; padding: 1rem 1.5rem; height: 130px; overflow-y: auto; }
        .mission-item { font-size: 12px; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; cursor: pointer; }

        /* SATÉLITE MEJORADO */
        .satellite-orbit { width: 80px; height: 80px; border: 2px dashed rgba(14, 165, 233, 0.4); border-radius: 50%; position: relative; animation: spin 6s linear infinite; display: none; margin: 10px auto 20px; }
        .satellite-body { width: 16px; height: 16px; background: #0ea5e9; border-radius: 50%; position: absolute; top: -8px; left: 50%; box-shadow: 0 0 20px #0ea5e9; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* AJUSTE 3: Paywall amigable */
        #paywall { display: none; position: absolute; inset: 0; background: rgba(2, 6, 23, 0.96); z-index: 50; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; border-radius: 1.5rem; }

        textarea { text-align: center; resize: none; overflow-y: auto; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 10px; }

        .tactical-footer { margin-top: 2rem; text-align: center; color: #f1f5f9; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.8em; font-weight: 600; }
    </style>
</head>
<body onload="checkCredits()">

    <div class="halftone-bg"></div>

    <div class="max-w-7xl w-full glass-panel rounded-[3rem] p-6 md:p-10 z-20">
        
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold text-white tracking-tighter leading-tight">
                UnRobotized <span class="text-sky-400 italic">PRO</span>
            </h1>
            <p class="text-slate-400 text-xs md:text-sm mt-3 uppercase tracking-wide font-light">
                Transforma mensajes fríos en aperturas de alto valor.
            </p>
        </header>

        <div class="grid md:grid-cols-2 gap-8 relative z-30">
            
            <div class="space-y-6 flex flex-col justify-between">
                <div class="grid grid-cols-3 gap-3">
                    <button id="t-dir" onclick="setTone('directo')" class="ps-button active ps-button-active py-4 rounded-xl">
                        <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2v20m0-20l-3.5 3.5M12 2l3.5 3.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                        Directo
                    </button>
                    <button id="t-cur" onclick="setTone('curioso')" class="ps-button py-4 rounded-xl">
                        <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" stroke-linecap="round" stroke-linejoin="round"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                        Curioso
                    </button>
                    <button id="t-wha" onclick="setTone('whatsapp')" class="ps-button py-4 rounded-xl">
                        <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                        </svg>
                        WhatsApp
                    </button>
                </div>

                <div class="neon-box">
                    <label class="box-title">Entrada de Texto</label>
                    <textarea id="inputMsg" rows="6" class="w-full bg-transparent p-5 text-white outline-none text-base leading-relaxed" placeholder="Pega tu mensaje aquí..."></textarea>
                    
                    <div id="paywall">
                        <span class="text-sky-400 font-extrabold text-xl mb-2 uppercase tracking-tighter">Acceso de Cortesía Completado</span>
                        <p class="text-slate-300 text-sm mb-8 px-6 leading-relaxed">Has agotado tus pruebas gratuitas. <br> Actualiza a la versión completa para seguir enviando misiles.</p>
                        <a href="TU_LINK_DE_PAGO" target="_blank" class="ps-button bg-sky-500 text-white py-4 px-10 rounded-xl font-extrabold uppercase tracking-widest scale-105">
                            Obtener Pase PRO ⚡
                        </a>
                    </div>
                </div>

                <button id="mainBtn" onclick="optimizar()" class="w-full ps-button bg-gradient-to-r from-indigo-600 to-sky-500 text-white py-6 rounded-2xl font-black text-base uppercase tracking-widest flex items-center justify-center gap-2">
                    Optimizar Mensaje
                </button>
            </div>

            <div class="flex flex-col gap-6 items-stretch">
                <div class="neon-box flex-grow min-h-[250px] relative">
                    <label class="box-title">Misil Generado</label>
                    <div id="generated_container" class="p-6 flex flex-col items-center justify-center flex-grow">
                        <div id="satellite" class="satellite-orbit"><div class="satellite-body"></div></div>
                        <div id="resArea" class="text-slate-300 italic text-center text-base overflow-y-auto w-full">Listo para calibrar tu mensaje...</div>
                    </div>
                    <div class="flex justify-center pb-6">
                        <button onclick="copiar()" id="copyBtn" class="ps-button bg-slate-100 text-slate-900 py-3 px-10 rounded-xl font-black tracking-widest">COPIAR TEXTO</button>
                    </div>
                </div>

                <div class="neon-box">
                    <label class="box-title" style="text-align:left; border:none; color:#475569; padding-bottom:0;">Misiones Recientes</label>
                    <div id="misiones_list"></div>
                </div>
            </div>
        </div>

        <footer class="tactical-footer">LAGUNA LABS - MCMXLIII</footer>
    </div>

    <script>
        let currentTone = 'directo';
        const MAX_FREE = 3;

        function checkCredits() {
            let used = localStorage.getItem('ur_used') || 0;
            if (used >= MAX_FREE) {
                document.getElementById('paywall').style.display = 'flex';
                document.getElementById('inputMsg').disabled = true;
                document.getElementById('mainBtn').disabled = true;
                document.getElementById('mainBtn').style.opacity = '0.3';
            }
            renderHistory();
        }

        function setTone(t) {
            currentTone = t;
            ['dir', 'cur', 'wha'].forEach(id => document.getElementById('t-'+id).classList.remove('ps-button-active'));
            document.getElementById('t-'+t.substring(0,3)).classList.add('ps-button-active');
        }

        async function optimizar() {
            const msg = document.getElementById('inputMsg').value;
            const resArea = document.getElementById('resArea');
            const sat = document.getElementById('satellite');
            const btn = document.getElementById('mainBtn');

            if(!msg) return alert("Socio, pega algo aburrido.");

            btn.disabled = true;
            sat.style.display = "block";
            resArea.innerText = "Sincronizando órbita...";
            
            try {
                const response = await fetch('/api/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, tone: currentTone })
                });
                const data = await response.json();
                
                resArea.style.fontStyle = "normal";
                resArea.innerText = data.optimized;

                let used = parseInt(localStorage.getItem('ur_used') || 0) + 1;
                localStorage.setItem('ur_used', used);
                
                let history = JSON.parse(localStorage.getItem('ur_history') || '[]');
                history.unshift({ tone: currentTone, text: data.optimized });
                // AJUSTE 4: El sistema guarda solo lo necesario para el render
                localStorage.setItem('ur_history', JSON.stringify(history.slice(0, 10)));

                checkCredits();
            } catch (e) { resArea.innerText = "Error de enlace."; }
            finally {
                sat.style.display = "none";
                btn.disabled = false;
            }
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('ur_history') || '[]');
            const list = document.getElementById('misiones_list');
            // AJUSTE 4: En el render limitamos la visualización inicial pero permitimos scroll
            list.innerHTML = history.slice(0, 3).map(m => `
                <div class="mission-item">
                    <span class="text-sky-500 font-bold">[${m.tone.toUpperCase()}]</span> ${m.text.substring(0, 45)}...
                </div>
            `).join('');
        }

        function copiar() {
            const txt = document.getElementById('resArea').innerText;
            if(txt.includes("calibrar")) return;
            navigator.clipboard.writeText(txt);
            const btn = document.getElementById('copyBtn');
            btn.innerText = "¡COPIADO!";
            setTimeout(() => btn.innerText = "COPIAR TEXTO", 2000);
        }
    </script>
</body>
</html>
