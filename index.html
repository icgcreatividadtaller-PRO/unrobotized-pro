<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnRobotized PRO | Laguna Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050a18; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        .neon-blue { box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
        .btn-mode { background: #1e293b; border: 1px solid #334155; transition: all 0.3s; }
        .btn-mode.active { background: #38bdf8; color: #000; border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.5); }
        .hidden { display: none; }
        #paywall { background: rgba(5, 10, 24, 0.98); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-7xl w-full glass-panel p-8 md:p-12 neon-blue relative">
        
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black italic tracking-tighter mb-1">UnRobotized <span class="text-sky-400">PRO</span></h1>
            <p class="text-[9px] uppercase tracking-[0.5em] text-sky-400/60 font-bold">Neural Humanizer Engine</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div class="flex gap-4">
                    <button onclick="setMode('directo')" id="btn-directo" class="btn-mode active flex-1 py-4 rounded-xl flex flex-col items-center gap-1">
                        <span class="text-xl">↑</span>
                        <span class="text-[10px] font-bold uppercase tracking-widest">Directo</span>
                    </button>
                    <button onclick="setMode('curioso')" id="btn-curioso" class="btn-mode flex-1 py-4 rounded-xl flex flex-col items-center gap-1">
                        <span class="text-xl">?</span>
                        <span class="text-[10px] font-bold uppercase tracking-widest">Curioso</span>
                    </button>
                    <button onclick="setMode('whatsapp')" id="btn-whatsapp" class="btn-mode flex-1 py-4 rounded-xl flex flex-col items-center gap-1">
                        <span class="text-xl">💬</span>
                        <span class="text-[10px] font-bold uppercase tracking-widest">WhatsApp</span>
                    </button>
                </div>

                <div class="bg-slate-900/80 rounded-2xl border border-slate-700 p-6 h-64 relative">
                    <label class="text-[10px] uppercase tracking-widest text-sky-400 font-bold mb-4 block">Entrada de Texto</label>
                    <textarea id="inputText" class="w-full h-40 bg-transparent outline-none resize-none text-slate-300 placeholder:opacity-20" placeholder="Pega tu mensaje aquí..."></textarea>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-slate-900/80 rounded-2xl border border-slate-700 p-6 h-48 flex flex-col">
                    <label class="text-[10px] uppercase tracking-widest text-sky-400 font-bold mb-4 block">Misil Generado</label>
                    <div id="outputContainer" class="flex-1 overflow-y-auto text-center italic text-slate-300">
                        <p id="outputText" class="text-sm md:text-base leading-relaxed">Listo para calibrar tu mensaje...</p>
                    </div>
                    <button onclick="copyText()" class="mt-4 bg-white text-black py-2 rounded-lg font-bold text-xs uppercase hover:bg-sky-400 transition-colors">Copiar Texto</button>
                </div>

                <div class="bg-slate-900/80 rounded-2xl border border-slate-700 p-6">
                    <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-4 block">Misiones Recientes</label>
                    <div id="mission-log" class="space-y-3 text-[10px] font-medium">
                        <div class="flex justify-between border-b border-white/5 pb-2 opacity-50">
                            <span>SISTEMA EN ÓRBITA...</span>
                            <span id="mission-count" class="text-sky-400">3/3</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button onclick="checkAndExecute()" class="w-full mt-8 py-5 bg-gradient-to-r from-blue-600 to-sky-400 text-white font-black rounded-2xl hover:scale-[1.02] active:scale-95 transition-all uppercase tracking-[0.2em] shadow-xl shadow-blue-500/20">
            Optimizar con pulso humano
        </button>

        <footer class="mt-12 text-center">
            <p class="text-[9px] tracking-[0.4em] opacity-40">LAGUNA LABS - MCMXLIII. ALL RIGHTS RESERVED - 2026</p>
        </footer>
    </div>

    <div id="paywall" class="fixed inset-0 z-50 flex items-center justify-center p-6 hidden">
        <div class="max-w-md w-full text-center p-12 glass-panel border-sky-400/50">
            <h2 class="text-3xl font-black mb-4">MISIÓN AGOTADA</h2>
            <p class="text-slate-400 mb-8 text-sm">Has alcanzado el límite de 3 misiones gratuitas. Activa el acceso ilimitado para continuar.</p>
            <div class="text-4xl font-black mb-8">$25.00 <span class="text-xs opacity-30">USD</span></div>
            <a href="https://lagunalabs.gumroad.com/l/abfic" target="_blank" class="block w-full py-5 bg-sky-400 text-black font-black rounded-2xl uppercase tracking-widest mb-4">Desbloquear Ahora</a>
        </div>
    </div>

    <script>
        let currentMode = 'directo';
        let missionsLeft = localStorage.getItem('unrobotized_misiones') || 3;
        document.getElementById('mission-count').innerText = `${missionsLeft}/3`;

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
        }

        async function checkAndExecute() {
            const text = document.getElementById('inputText').value;
            if(!text) return;

            try {
                const response = await fetch('/api/check-limit');
                const data = await response.json();
                if (data.blocked || missionsLeft <= 0) { showPaywall(); return; }
            } catch (e) {
                if (missionsLeft <= 0) { showPaywall(); return; }
            }

            const res = await fetch('/api/optimize', {
                method: 'POST',
                body: JSON.stringify({ text: text, mode: currentMode }),
                headers: {'Content-Type': 'application/json'}
            });
            const result = await res.json();

            document.getElementById('outputText').innerText = result.humanizedText;
            
            missionsLeft--;
            localStorage.setItem('unrobotized_misiones', missionsLeft);
            document.getElementById('mission-count').innerText = `${missionsLeft}/3`;
            addLogEntry(result.humanizedText);
        }

        function addLogEntry(txt) {
            const log = document.getElementById('mission-log');
            const entry = document.createElement('div');
            entry.className = "text-sky-400 truncate border-b border-white/5 pb-2";
            entry.innerText = `[${currentMode.toUpperCase()}] ${txt}`;
            log.prepend(entry);
        }

        function showPaywall() { document.getElementById('paywall').classList.remove('hidden'); }
        function copyText() {
            const t = document.getElementById('outputText').innerText;
            navigator.clipboard.writeText(t);
        }
    </script>
</body>
</html>
