<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnRobotized PRO | Laguna Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background-color: #050a18; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            position: relative;
        }

        /* EFECTO HALF-TONE POTENCIADO (Punto 4) */
        .halftone-overlay {
            position: absolute;
            bottom: 0; right: 0; width: 60%; height: 60%;
            background-image: radial-gradient(rgba(56, 189, 248, 0.25) 3px, transparent 3px);
            background-size: 18px 18px;
            mask-image: radial-gradient(circle at bottom right, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 80%);
            -webkit-mask-image: radial-gradient(circle at bottom right, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 80%);
            pointer-events: none;
            z-index: 0;
        }

        .glass-panel { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 2.5rem; 
            z-index: 10;
        }

        /* BEVEL & EMBOSS PROFUNDO */
        .btn-bevel-deep {
            background: #1e293b;
            border-top: 2px solid rgba(255, 255, 255, 0.3);
            border-left: 2px solid rgba(255, 255, 255, 0.15);
            border-bottom: 5px solid rgba(0, 0, 0, 0.8);
            border-right: 4px solid rgba(0, 0, 0, 0.6);
            box-shadow: inset 2px 2px 4px rgba(255, 255, 255, 0.05), 0 10px 20px rgba(0,0,0,0.4);
            transition: all 0.1s ease;
        }
        .btn-bevel-deep:active {
            border-top: 5px solid rgba(0, 0, 0, 0.8);
            border-left: 4px solid rgba(0, 0, 0, 0.6);
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            border-right: 2px solid rgba(255, 255, 255, 0.1);
            transform: translateY(3px);
        }
        .btn-bevel-deep.active {
            background: #38bdf8;
            color: #000;
            border-top-color: rgba(255,255,255,0.6);
            border-bottom-color: #0369a1;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.5), inset 2px 2px 4px rgba(255,255,255,0.7);
        }

        /* ÓRBITA Y SATÉLITE REAL */
        @keyframes real-orbit {
            from { transform: rotate(0deg) translateX(60px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(60px) rotate(-360deg); }
        }
        .orbit-path {
            display: none;
            position: absolute;
            top: 65px; left: 50%;
            width: 120px; height: 120px;
            border: 1px dashed rgba(56, 189, 248, 0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
        }
        .satellite-unit {
            position: absolute;
            top: 50%; left: 50%;
            width: 35px; height: 35px;
            margin-top: -17.5px; margin-left: -17.5px;
            animation: real-orbit 5s linear infinite;
        }

        /* RECUADROS CON FLOTADO CIAN (Punto 3) */
        .floating-box {
            background: rgba(15, 23, 42, 0.95);
            border: 2px solid rgba(56, 189, 248, 0.3);
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.2));
            transition: all 0.3s ease;
        }
        .floating-box:focus-within {
            border-color: #38bdf8;
            filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.4));
        }

        .text-action { font-size: 14px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; }
        .text-header-box { font-size: 16px; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase; }
        .text-footer { font-size: 11px; font-weight: 900; letter-spacing: 0.4em; text-transform: uppercase; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-6xl w-full glass-panel p-8 md:p-12 shadow-2xl relative overflow-hidden">
        <div class="halftone-overlay"></div>
        
        <div class="flex flex-col items-center justify-center mb-10 relative z-20">
            <div class="flex items-center gap-4 mb-4">
                <svg width="45" height="45" viewBox="0 0 24 24" fill="none" class="text-sky-400 drop-shadow-[0_0_8px_rgba(56,189,248,0.5)]">
                    <path d="M12 2L2 12L12 22L22 12L12 2Z" fill="currentColor" opacity="0.2"/>
                    <path d="M12 2L2 12L12 22L22 12L12 2Z" stroke="currentColor" stroke-width="2"/>
                    <circle cx="12" cy="12" r="3" fill="currentColor"/>
                </svg>
                <h1 class="text-3xl sm:text-4xl md:text-5xl font-black italic tracking-tighter text-white whitespace-nowrap">
                    UnRobotized <span class="text-sky-400">PRO</span>
                </h1>
            </div>
            <p class="text-[10px] md:text-xs font-bold uppercase tracking-[0.2em] text-slate-300 mb-1 text-center w-full">
                TRANSFORMA MENSAJES FRIOS EN APERTURAS DE ALTO VALOR
            </p>
            <p class="text-[9px] font-black uppercase tracking-[0.3em] text-sky-500/80 text-center">Neural Humanizer Engine</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 relative z-20">
            
            <div class="space-y-6">
                <div class="flex gap-3 w-full">
                    <button onclick="setMode('directo')" id="btn-directo" class="btn-bevel-deep active flex-1 py-5 rounded-2xl flex flex-col items-center gap-2 text-action">
                        <span class="text-xl">↑</span>
                        <span class="hidden sm:inline">Directo</span>
                    </button>
                    <button onclick="setMode('curioso')" id="btn-curioso" class="btn-bevel-deep flex-1 py-5 rounded-2xl flex flex-col items-center gap-2 text-action">
                        <span class="text-xl">?</span>
                        <span class="hidden sm:inline">Curioso</span>
                    </button>
                    <button onclick="setMode('whatsapp')" id="btn-whatsapp" class="btn-bevel-deep flex-1 py-5 rounded-2xl flex flex-col items-center gap-2 text-action">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38c1.45.79 3.08 1.21 4.74 1.21 5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.816 9.816 0 0 0 12.04 2z"/></svg>
                        <span class="hidden sm:inline">WhatsApp</span>
                    </button>
                </div>

                <div class="floating-box rounded-3xl p-6 h-72 relative">
                    <label class="text-header-box text-sky-400 mb-4 block text-center w-full">Entrada de Texto</label>
                    <textarea id="inputText" class="w-full h-48 bg-transparent outline-none resize-none text-lg text-slate-200 text-center" placeholder="Pega tu mensaje frío aquí..."></textarea>
                </div>

                <button onclick="checkAndExecute()" class="btn-bevel-deep w-full py-6 bg-sky-500 text-white rounded-2xl text-action">
                    Optimizar con pulso humano
                </button>
            </div>

            <div class="space-y-6 flex flex-col">
                <div class="floating-box rounded-3xl p-8 min-h-[440px] flex flex-col relative overflow-hidden">
                    <label class="text-header-box text-sky-400 mb-6 block text-center w-full">Misil Generado</label>
                    
                    <div id="sat-container" class="orbit-path">
                        <div class="satellite-unit">
                            <svg viewBox="0 0 24 24" fill="none" class="text-sky-400 drop-shadow-[0_0_8px_rgba(56,189,248,1)]">
                                <path d="M12 2L2 12L12 22L22 12L12 2Z" fill="currentColor"/>
                            </svg>
                        </div>
                    </div>

                    <div class="flex-1 flex items-start justify-center text-center italic text-slate-100 overflow-y-auto pt-10">
                        <p id="outputText" class="text-lg md:text-xl leading-relaxed py-6">Listo para el lanzamiento...</p>
                    </div>
                    
                    <button onclick="copyText()" class="btn-bevel-deep mt-6 bg-white text-black py-4 rounded-xl text-action">
                        Copiar Texto
                    </button>
                </div>

                <div class="bg-slate-900/50 rounded-2xl border border-slate-800 p-5 flex justify-between items-center relative z-20">
                    <span class="text-[11px] uppercase tracking-widest text-slate-500 italic">Laguna Labs Status</span>
                    <span id="mission-count" class="text-[11px] font-black text-sky-400">3/3 DISPONIBLES</span>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center relative z-20">
            <p class="text-footer opacity-40 text-white">LAGUNA LABS - MCMXLIII. 2026</p>
        </footer>
    </div>

    <script>
        let currentMode = 'directo';
        let missionsLeft = localStorage.getItem('unrobotized_misiones') || 3;
        document.getElementById('mission-count').innerText = `${missionsLeft}/3 DISPONIBLES`;

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.btn-bevel-deep').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
        }

        async function checkAndExecute() {
            const text = document.getElementById('inputText').value;
            if(!text) return;

            document.getElementById('sat-container').style.display = 'block';
            document.getElementById('outputText').innerText = "CALIBRANDO MISIL...";

            try {
                const res = await fetch('/api/optimize', {
                    method: 'POST',
                    body: JSON.stringify({ text, mode: currentMode }),
                    headers: {'Content-Type': 'application/json'}
                });
                const result = await res.json();
                document.getElementById('sat-container').style.display = 'none';

                if (result.humanizedText) {
                    document.getElementById('outputText').innerText = result.humanizedText;
                    missionsLeft--;
                    localStorage.setItem('unrobotized_misiones', missionsLeft);
                    document.getElementById('mission-count').innerText = `${missionsLeft}/3 DISPONIBLES`;
                } else {
                    document.getElementById('outputText').innerText = "ERROR: " + (result.error || "Fallo neural.");
                }
            } catch (error) {
                document.getElementById('sat-container').style.display = 'none';
                document.getElementById('outputText').innerText = "ERROR DE CONEXIÓN.";
            }
        }
        function copyText() { navigator.clipboard.writeText(document.getElementById('outputText').innerText); }
    </script>
</body>
</html>
