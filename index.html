<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnRobotized PRO | Laguna Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background-color: #050a18; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 1. HALF-TONE AGRESIVO DIAGONAL (Punto 2) */
        .halftone-bg {
            position: fixed;
            bottom: 0; right: 0;
            width: 100%; height: 100%;
            background-image: radial-gradient(rgba(34, 211, 238, 0.4) 4px, transparent 4px);
            background-size: 22px 22px;
            mask-image: linear-gradient(225deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 75%);
            -webkit-mask-image: linear-gradient(225deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 75%);
            pointer-events: none;
            z-index: 1;
        }

        /* PANEL CENTRAL: Evita el efecto "para ciegos" en Web */
        .glass-panel-pro { 
            background: rgba(15, 23, 42, 0.97); 
            backdrop-filter: blur(40px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 3rem; 
            z-index: 10;
            position: relative;
            max-width: 1000px;
            width: 100%;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
        }

        /* 2. BEVEL & EMBOSS ULTRA PROFUNDO (Punto 3 y 5) */
        .btn-bevel-pro {
            background: #1e293b;
            border-top: 3.5px solid rgba(255, 255, 255, 0.4);
            border-left: 2px solid rgba(255, 255, 255, 0.2);
            border-bottom: 9px solid rgba(0, 0, 0, 0.95);
            border-right: 6px solid rgba(0, 0, 0, 0.75);
            box-shadow: inset 2px 2px 5px rgba(255, 255, 255, 0.1), 0 15px 35px rgba(0,0,0,0.6);
            transition: all 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-bevel-pro:active {
            border-top: 9px solid rgba(0, 0, 0, 0.95);
            border-left: 6px solid rgba(0, 0, 0, 0.75);
            border-bottom: 2px solid rgba(255, 255, 255, 0.15);
            border-right: 2px solid rgba(255, 255, 255, 0.15);
            transform: translateY(6px);
        }
        .btn-bevel-pro.active {
            background: #22d3ee;
            color: #000;
            border-top-color: rgba(255,255,255,0.75);
            border-bottom-color: #0891b2;
            box-shadow: 0 0 45px rgba(34, 211, 238, 0.6), inset 2px 2px 6px rgba(255,255,255,0.9);
        }

        /* 3. RECUADROS CON GLOW CIAN (Punto 3) */
        .cyan-box-pro {
            background: rgba(10, 15, 28, 0.98);
            border: 2px solid rgba(34, 211, 238, 0.5);
            filter: drop-shadow(0 0 20px rgba(34, 211, 238, 0.25));
            transition: all 0.3s ease;
        }

        /* 4. ÓRBITA Y SATÉLITE REALISTA (Punto 3) */
        @keyframes orbit-animation {
            from { transform: rotate(0deg) translateX(75px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(75px) rotate(-360deg); }
        }
        .orbit-system {
            display: none;
            position: absolute;
            top: 75px; left: 50%;
            width: 150px; height: 150px;
            border: 2px dashed rgba(34, 211, 238, 0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
        }
        .satellite-unit {
            position: absolute;
            top: 50%; left: 50%;
            width: 45px; height: 45px;
            margin-top: -22.5px; margin-left: -22.5px;
            animation: orbit-animation 5s linear infinite;
        }

        /* TIPOGRAFÍA RECALIBRADA (Punto 4) */
        .text-action { font-size: 14px; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; }
        .text-label-pro { font-size: 17px; font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase; }
        .text-engine-pro { font-size: 11px; font-weight: 900; letter-spacing: 0.45em; text-transform: uppercase; }
        .text-footer-pro { font-size: 13px; font-weight: 900; letter-spacing: 0.25em; text-transform: uppercase; }

        /* Estilización de Scroll */
        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-thumb { background: rgba(34, 211, 238, 0.3); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="halftone-bg"></div>

    <div class="glass-panel-pro p-8 md:p-14 shadow-2xl relative overflow-hidden">
        
        <header class="flex flex-col items-center justify-center mb-12 relative z-20">
            <div class="flex items-center gap-5 mb-5">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" class="text-cyan-400 drop-shadow-[0_0_15px_rgba(34,211,238,0.7)]">
                    <rect x="2" y="9" width="4" height="6" rx="1" fill="currentColor"/>
                    <rect x="18" y="9" width="4" height="6" rx="1" fill="currentColor"/>
                    <path d="M6 12H18M12 6V18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M8 8.5L12 5L16 8.5V15.5L12 19L8 15.5V8.5Z" fill="currentColor" fill-opacity="0.2" stroke="currentColor" stroke-width="2"/>
                    <circle cx="12" cy="12" r="2.5" fill="white"/>
                </svg>
                <h1 class="text-3xl sm:text-5xl md:text-6xl font-black italic tracking-tighter text-white whitespace-nowrap">
                    UnRobotized <span class="text-cyan-400 uppercase">PRO</span>
                </h1>
            </div>
            
            <div class="text-center space-y-2">
                <p class="text-[11px] sm:text-sm font-bold uppercase tracking-[0.25em] text-slate-300 w-full text-center">
                    TRANSFORMA MENSAJES FRIOS EN APERTURAS DE ALTO VALOR
                </p>
                <p class="text-engine-pro text-cyan-500/90 text-center">Neural Humanizer Engine</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 relative z-20">
