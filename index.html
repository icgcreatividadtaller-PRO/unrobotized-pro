<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnRobotized Pro | Precision Action v3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f8fafc; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        .glass-panel { 
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 1);
            position: relative;
            z-index: 20;
        }

        /* --- EFECTO PHOTOSHOP: BEVEL & EMBOSS --- */
        .ps-button {
            border-top: 3px solid rgba(255, 255, 255, 0.25);
            border-left: 3px solid rgba(255, 255, 255, 0.25);
            border-right: 3px solid rgba(0, 0, 0, 0.5);
            border-bottom: 3px solid rgba(0, 0, 0, 0.5);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
        }
        .ps-button:active {
            border-top: 3px solid rgba(0, 0, 0, 0.5);
            border-left: 3px solid rgba(0, 0, 0, 0.5);
            border-right: 3px solid rgba(255, 255, 255, 0.1);
            border-bottom: 3px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.98);
        }
        .tone-btn.active {
            background-color: #0ea5e9 !important;
            color: #020617 !important;
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.5);
        }

        /* --- NEÓN REFORZADO --- */
        .neon-box {
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid rgba(14, 165, 233, 0.4);
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.2);
            border-radius: 1.5rem;
        }

        /* --- HALFTONE DINÁMICO --- */
        .halftone-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1;
            background-image: radial-gradient(circle, #0ea5e9 1.5px, transparent 1.5px);
            background-size: 14px 14px;
            mask-image: radial-gradient(circle at bottom right, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%);
            -webkit-mask-image: radial-gradient(circle at bottom right, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%);
            opacity: 0.35;
        }

        textarea { text-align: center; resize: none; }
        ::placeholder { color: #475569 !important; opacity: 1; } 
    </style>
</head>
<body class="flex items-center justify-center p-2 md:p-4">

    <div class="halftone-bg"></div>

    <div class="max-w-7xl w-full glass-panel rounded-[3rem] p-6 md:p-8 overflow-hidden">
        
        <header class="text-center mb-6">
            <h1 class="text-4xl md:text-5xl font-extrabold text-white tracking-tighter leading-tight">
                UnRobotized <span class="text-sky-400 italic">PRO</span>
            </h1>
            <p class="text-slate-200 text-base md:text-lg mt-2 font-light tracking-wide uppercase">
                Transforma mensajes fríos genéricos en aperturas de negocios de alto valor.
            </p>
        </header>

        <div class="grid md:grid-cols-2 gap-8 relative z-30 items-stretch">
            
            <div class="space-y-6 flex flex-col justify-between">
                <div class="space-y-4">
                    <label class="block text-xs font-black text-sky-400 uppercase tracking-[0.4em] text-center">Táctica de Apertura</label>
                    <div class="grid grid-cols-3 gap-3">
                        <button id="t-dir" onclick="setTone('directo')" class="tone-btn ps-button active py-3 rounded-xl text-sm font-black uppercase">🚀 Directo</button>
                        <button id="t-cur" onclick="setTone('curioso')" class="tone-btn ps-button py-3 rounded-xl text-sm font-black uppercase text-slate-100">🧐 Curioso</button>
                        <button id="t-wha" onclick="setTone('whatsapp')" class="tone-btn ps-button py-3 rounded-xl text-sm font-black uppercase text-slate-100">📱 WhatsApp</button>
                    </div>
                </div>

                <div class="neon-box">
                    <p class="text-[10px] font-black text-slate-100 uppercase tracking-[0.3em] text-center mt-4">Pega tu mensaje original aburrido aquí:</p>
                    <textarea id="inputMsg" rows="4" 
                        class="w-full bg-transparent p-5 text-white font-medium outline-none text-base leading-relaxed" 
                        placeholder="Ej: Hola estimado, quería ofrecerle..."></textarea>
                </div>

                <button id="mainBtn" onclick="optimizar()" class="w-full ps-button bg-gradient-to-r from-indigo-600 to-sky-500 text-white py-5 rounded-2xl font-black text-base uppercase tracking-[0.2em]">
                    Optimizar Mensaje ✨
                </button>
            </div>

            <div id="resPanel" class="neon-box p-6 flex flex-col border border-white/10 h-full">
                <div class="text-center border-b border-white/20 pb-4 mb-4">
                    <span class="text-xs font-black text-sky-400 uppercase tracking-[0.4em]">Misil de Ventas Generado</span>
                </div>
                
                <div id="resArea" class="flex-grow flex items-center justify-center p-4 text-slate-300 italic text-base leading-relaxed text-center overflow-y-auto">
                    Listo para calibrar tu mensaje...
                </div>

                <div class="mt-6 flex justify-center">
                    <button id="copyBtn" onclick="copiar()" class="ps-button bg-slate-100 hover:bg-white text-slate-900 py-3 px-10 rounded-xl font-black text-xs uppercase tracking-widest transition-all">
                        Copiar Texto
                    </button>
                </div>
            </div>
        </div>

        <footer class="mt-8 text-center">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[1em]">Precision Platform v3.1 | 2026 Engine</p>
        </footer>
    </div>

    <script>
        let currentTone = 'directo';

        function setTone(t) {
            currentTone = t;
            ['directo', 'curioso', 'whatsapp'].forEach(id => {
                const btn = document.getElementById('t-' + id.substring(0,3));
                btn.classList.remove('active');
                btn.classList.add('text-slate-100');
            });
            const active = document.getElementById('t-' + t.substring(0,3));
            active.classList.add('active');
            active.classList.remove('text-slate-100');
        }

        async function optimizar() {
            const msg = document.getElementById('inputMsg').value;
            const resArea = document.getElementById('resArea');
            const btn = document.getElementById('mainBtn');
            
            if(!msg) return alert("Pega un mensaje, socio.");

            btn.disabled = true;
            resArea.innerText = "Sincronizando patrones... ⏳";
            resArea.classList.remove('text-slate-300');
            resArea.classList.add('text-white');

            try {
                // LLAMADA SEGURA AL BACKEND DE VERCEL
                const response = await fetch('/api/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, tone: currentTone })
                });
                
                const data = await response.json();
                resArea.innerText = data.optimized || data.error;
            } catch (error) {
                resArea.innerText = "Error de conexión. Revisa los logs en Vercel.";
            } finally {
                btn.disabled = false;
            }
        }

        function copiar() {
            const texto = document.getElementById('resArea').innerText;
            if(texto.includes("Listo para calibrar")) return;
            navigator.clipboard.writeText(texto);
            const copyBtn = document.getElementById('copyBtn');
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "¡COPIADO!";
            setTimeout(() => copyBtn.innerText = originalText, 2000);
        }
    </script>
</body>
</html>
