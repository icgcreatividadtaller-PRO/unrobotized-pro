<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnRobotized Pro | Precision Action v3.4</title>
    
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="icon" type="image/png" href="/icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f8fafc; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        .glass-panel { 
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 1);
            position: relative;
            z-index: 20;
        }

        /* --- EFECTO PHOTOSHOP: BEVEL & EMBOSS --- */
        .ps-button {
            border-top: 3px solid rgba(255, 255, 255, 0.25);
            border-left: 3px solid rgba(255, 255, 255, 0.25);
            border-right: 3px solid rgba(0, 0, 0, 0.5);
            border-bottom: 3px solid rgba(0, 0, 0, 0.5);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
        }
        .ps-button:active {
            border-top: 3px solid rgba(0, 0, 0, 0.5);
            border-left: 3px solid rgba(0, 0, 0, 0.5);
            border-right: 3px solid rgba(255, 255, 255, 0.1);
            border-bottom: 3px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.98);
        }
        .tone-btn.active {
            background-color: #0ea5e9 !important;
            color: #020617 !important;
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.5);
        }

        /* --- NEÓN REFORZADO --- */
        .neon-box {
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid rgba(14, 165, 233, 0.4);
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.2);
            border-radius: 1.5rem;
        }

        /* --- HALFTONE DINÁMICO --- */
        .halftone-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1;
            background-image: radial-gradient(circle, #0ea5e9 1.5px, transparent 1.5px);
            background-size: 14px 14px;
            mask-image: radial-gradient(circle at bottom right, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%);
            -webkit-mask-image: radial-gradient(circle at bottom right, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%);
            opacity: 0.35;
        }

        /* --- ANIMACIÓN SATÉLITE --- */
        .satellite-orbit {
            width: 50px; height: 50px;
            border: 1px dashed rgba(14, 165, 233, 0.5);
            border-radius: 50%;
            position: relative;
            animation: spin 3s linear infinite;
            display: none;
            margin: 0 auto 15px;
        }
        .satellite-body {
            width: 10px; height: 10px;
            background: #0ea5e9;
            border-radius: 50%;
            position: absolute;
            top: -5px; left: 50%;
            box-shadow: 0 0 15px #0ea5e9;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        textarea { text-align: center; resize: none; }
        ::placeholder { color: #475569 !important; }
    </style>
</head>
<body class="flex items-center justify-center p-2 md:p-4">

    <div class="halftone-bg"></div>

    <div class="max-w-7xl w-full glass-panel rounded-[3rem] p-6 md:p-10">
        
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-extrabold text-white tracking-tighter leading-tight">
                UnRobotized <span class="text-sky-400 italic">PRO</span>
            </h1>
            <p class="text-slate-400 text-xs md:text-sm mt-3 font-light tracking-wide uppercase">
                Transforma mensajes fríos genéricos en aperturas de negocios de alto valor.
            </p>
        </header>

        <div class="grid md:grid-cols-2 gap-8 relative z-30">
            
            <div class="space-y-6 flex flex-col justify-between">
                <div class="space-y-4">
                    <label class="block text-[11px] font-black text-sky-400 uppercase tracking-[0.4em] text-center">Táctica de Apertura</label>
                    <div class="grid grid-cols-3 gap-3">
                        <button id="t-dir" onclick="setTone('directo')" class="tone-btn ps-button active py-4 rounded-xl text-xs md:text-sm font-black uppercase flex flex-col items-center gap-2">
