<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnRobotized PRO | Laguna Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        /* --- RESET Y BASE --- */
        body { 
            background-color: #050a18; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- 1. EFECTO HALF-TONE AGRESIVO (Diagonal Inferior Derecha) --- */
        /* Esta capa se encarga de dar la textura de impresión de los planners */
        .halftone-engine {
            position: fixed;
            bottom: -50px; 
            right: -50px;
            width: 100%; 
            height: 100%;
            background-image: radial-gradient(rgba(34, 211, 238, 0.45) 5px, transparent 5px);
            background-size: 24px 24px;
            mask-image: radial-gradient(circle at bottom right, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 85%);
            -webkit-mask-image: radial-gradient(circle at bottom right, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 85%);
            pointer-events: none;
            z-index: 1;
        }

        /* --- 2. EL PANEL PRINCIPAL (GLASSMORPHISM) --- */
        .glass-panel-pro { 
            background: rgba(15, 23, 42, 0.98); 
            backdrop-filter: blur(45px); 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            border-radius: 3.5rem; 
            z-index: 10;
            position: relative;
            max-width: 1000px;
            width: 100%;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
        }

        /* --- 3. BEVEL & EMBOSS ULTRA PROFUNDO (Photoshop Style) --- */
        /* Aplicado a botones para que parezcan hardware físico */
        .btn-bevel-final {
            background: #1e293b;
            border-top: 4px solid rgba(255, 255, 255, 0.45);
            border-left: 2px solid rgba(255, 255, 255, 0.25);
            border-bottom: 9px solid rgba(0, 0, 0, 0.95);
            border-right: 6px solid rgba(0, 0, 0, 0.75);
            box-shadow: inset 2px 2px 5px rgba(255, 255, 255, 0.15), 0 20px 40px rgba(0,0,0,0.6);
            transition: all 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        .btn-bevel-final:active {
            border-top: 9px solid rgba(0, 0, 0, 0.95);
            border-left: 6px solid rgba(0, 0, 0, 0.75);
            border-bottom: 2px solid rgba(255, 255, 255, 0.15);
            border-right: 2px solid rgba(255, 255, 255, 0.15);
            transform: translateY(6px);
            box-shadow: inset 3px 3px 8px rgba(0,0,0,0.6);
        }
        .btn-bevel-final.active {
            background: #22d3ee;
            color: #000;
            border-top-color: rgba(255,255,255,0.8);
            border-bottom-color: #0891b2;
            box-shadow: 0 0 45px rgba(34, 211, 238, 0.7), inset 2px 2px 8px rgba(255,255,255,0.9);
        }

        /* --- 4. RECUADROS FLOTANTES CON GLOW CIAN --- */
        .floating-cyan-box {
            background: rgba(10, 15, 28, 0.98);
            border: 2px solid rgba(34, 211, 238, 0.55);
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.25);
            transition: all 0.4s ease;
            position: relative;
        }

        /* --- 5. ÓRBITA Y SATÉLITE REALISTA --- */
        @keyframes satellite-orbit {
            from { transform: rotate(0deg) translateX(85px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(85px) rotate(-360deg); }
        }
        .orbit-path-final {
            display: none;
            position: absolute;
            top: 85px; 
            left: 50%;
            width: 170px; 
            height: 170px;
            border: 2px dashed rgba(34, 211, 238, 0.45);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
        }
        .sat-unit-pro {
            position: absolute;
            top: 50%; 
            left: 50%;
            width: 48px; 
            height: 48px;
            margin-top: -24px; 
            margin-left: -24px;
            animation: satellite-orbit 6s linear infinite;
        }

        /* --- 6. TIPOGRAFÍA Y JERARQUÍA --- */
        .text-action-pro { font-size: 14px; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase; }
        .text-label-pro { font-size: 17px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; }
        .text-engine-final { font-size: 11px; font-weight: 900; letter-spacing: 0.55em; text-transform: uppercase; }
        .text-footer-final { font-size: 13px; font-weight: 900; letter-spacing: 0.28em; text-transform: uppercase; }

        /* Estilización del Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(34, 211, 238, 0.3); border-radius: 10px; }
    </style>
</head>

                        <span>Curioso</span>
                    </button>
