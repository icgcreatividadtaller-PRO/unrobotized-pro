<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnRobotized PRO | Laguna Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050a18; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        .btn-mode { background: #1e293b; border: 1px solid #334155; transition: 0.3s; }
        .btn-mode.active { background: #38bdf8; color: #000; border-color: #38bdf8; box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }
        
        /* ANIMACIÓN DEL SATÉLITE PRO */
        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(45px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(45px) rotate(-360deg); }
        }
        .satellite-loader { display: none; position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: #38bdf8; border-radius: 50%; box-shadow: 0 0 15px #38bdf8; animation: orbit 1.5s linear infinite; z-index: 20; }
        .neural-center { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; background: rgba(56, 189, 248, 0.2); border-radius: 50%; z-index: 10; filter: blur(4px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-10">

    <div class="max-w-6xl w-full glass-panel p-6 md:p-10 shadow-2xl relative">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-5xl font-black italic tracking-tighter mb-2 uppercase text-white">
                UnRobotized <span class="text-sky-400">PRO</span>
            </h1>
            <p class="text-[9px] md:text-xs uppercase tracking-[0.2em] font-bold text-slate-300">
                TRANSFORMA MENSAJES FRÍOS EN APERTURAS DE ALTO VALOR
            </p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="space-y-6">
                <div class="flex gap-2">
                    <button onclick="setMode('directo')" id="btn-directo" class="btn-mode active flex-1 py-4 rounded-xl flex flex-col items-center">
                        <span class="text-xl">↑</span>
                        <span class="text-[10px] font-black uppercase">Directo</span>
                    </button>
                    <button onclick="setMode('curioso')" id="btn-curioso" class="btn-mode flex-1 py-4 rounded-xl flex flex-col items-center">
                        <span class="text-xl">?</span>
                        <span class="text-[10px] font-black uppercase">Curioso</span>
                    </button>
                    <button onclick="setMode('whatsapp')" id="btn-whatsapp" class="btn-mode flex-1 py-4 rounded-xl flex flex-col items-center">
                        <span class="text-xl">💬</span>
                        <span class="text-[10px] font-black uppercase">WhatsApp</span>
                    </button>
                </div>

                <div class="bg-slate-900/90 rounded-2xl border border-slate-700 p-6 h-64 md:h-72">
                    <textarea id="inputText" class="w-full h-full bg-transparent outline-none resize-none text-base md:text-lg text-slate-200" placeholder="Pega tu mensaje aquí..."></textarea>
                </div>

                <button onclick="checkAndExecute()" class="w-full py-5 bg-sky-500 text-white font-black rounded-2xl hover:bg-sky-400 transition-all uppercase tracking-[0.2em] shadow-lg text-sm">
                    Optimizar con pulso humano
                </button>
            </div>

            <div class="space-y-6 flex flex-col">
                <div class="bg-slate-900/90 rounded-2xl border border-sky-500/30 p-6 min-h-[300px] md:min-h-[380px] flex flex-col relative overflow-hidden">
                    <label class="text-[10px] uppercase tracking-widest text-sky-400 font-black mb-4 block">Misil Generado</label>
                    
                    <div class="neural-center" id="sat-center"></div>
                    <div class="satellite-loader" id="sat-orb"></div>

                    <div class="flex-1 flex items-start justify-center text-center italic text-slate-100 overflow-y-auto">
                        <p id="outputText" class="text-base md:text-lg leading-relaxed py-4 px-2">Listo para calibrar...</p>
                    </div>
                    <button onclick="copyText()" class="mt-4 bg-white text-black py-3 rounded-lg font-black text-[10px] uppercase hover:bg-sky-400 transition-all">Copiar Texto</button>
                </div>

                <div class="bg-slate-900/50 rounded-xl border border-slate-800 p-4 flex justify-between items-center">
                    <span class="text-[9px] uppercase tracking-widest text-slate-400 font-bold italic">Misiones Recientes</span>
                    <span id="mission-count" class="text-[9px] font-black text-sky-400">3/3 DISPONIBLES</span>
                </div>
            </div>
        </div>

        <footer class="mt-10 text-center">
            <p class="text-[9px] tracking-[0.4em] opacity-40 font-black uppercase text-white">LAGUNA LABS - MCMXLIII. 2026</p>
        </footer>
    </div>

    <script>
        let currentMode = 'directo';
        let missionsLeft = localStorage.getItem('unrobotized_misiones') || 3;
        document.getElementById('mission-count').innerText = `${missionsLeft}/3 DISPONIBLES`;

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
        }

        async function checkAndExecute() {
            const text = document.getElementById('inputText').value;
            if(!text) return;

            // ACTIVAR SATÉLITE
            document.getElementById('sat-center').style.display = 'block';
            document.getElementById('sat-orb').style.display = 'block';
            document.getElementById('outputText').innerText = "CONECTANDO CON EL SATÉLITE...";

            try {
                const res = await fetch('/api/optimize', {
                    method: 'POST',
                    body: JSON.stringify({ text, mode: currentMode }),
                    headers: {'Content-Type': 'application/json'}
                });
                const result = await res.json();

                // APAGAR SATÉLITE
                document.getElementById('sat-center').style.display = 'none';
                document.getElementById('sat-orb').style.display = 'none';

                if (result.humanizedText) {
                    document.getElementById('outputText').innerText = result.humanizedText;
                    missionsLeft--;
                    localStorage.setItem('unrobotized_misiones', missionsLeft);
                    document.getElementById('mission-count').innerText = `${missionsLeft}/3 DISPONIBLES`;
                } else {
                    document.getElementById('outputText').innerText = "ERROR: " + (result.error || "Fallo neural.");
                }
            } catch (error) {
                document.getElementById('sat-center').style.display = 'none';
                document.getElementById('sat-orb').style.display = 'none';
                document.getElementById('outputText').innerText = "ERROR DE CONEXIÓN.";
            }
        }
        function copyText() { navigator.clipboard.writeText(document.getElementById('outputText').innerText); }
    </script>
</body>
</html>
