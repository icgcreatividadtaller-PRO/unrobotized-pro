<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnRobotized PRO | Laguna Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background-color: #050a18; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            position: relative;
        }

        /* EFECTO HALF-TONE DIAGONAL (Punto 2) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(56, 189, 248, 0.15) 1.5px, transparent 1.5px);
            background-size: 12px 12px;
            mask-image: linear-gradient(225deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%);
            -webkit-mask-image: linear-gradient(225deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
            z-index: -1;
        }

        .glass-panel { 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 2.5rem; 
        }

        /* BEVEL & EMBOSS TIPO PHOTOSHOP (Punto 3) */
        .btn-bevel {
            background: #1e293b;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 2px solid rgba(0, 0, 0, 0.5);
            border-right: 2px solid rgba(0, 0, 0, 0.4);
            box-shadow: inset 1px 1px 0px rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }
        .btn-bevel:active {
            border-top: 2px solid rgba(0, 0, 0, 0.5);
            border-left: 2px solid rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateY(1px);
        }
        .btn-bevel.active {
            background: #38bdf8;
            color: #000;
            border-color: #7dd3fc;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.5), inset 1px 1px 2px rgba(255,255,255,0.5);
        }

        /* SATÉLITE ORBITANDO LENTAMENTE (Punto 3) */
        @keyframes slow-orbit {
            0% { transform: rotate(0deg) translateX(35px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(35px) rotate(-360deg); }
        }
        .sat-loader {
            display: none;
            position: absolute;
            top: 25px; left: 50%;
            width: 24px; height: 24px;
            animation: slow-orbit 3s linear infinite;
            z-index: 100;
        }

        /* TAMAÑOS DE TEXTO CALIBRADOS (Punto 4) */
        .text-action { font-size: 14px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; }
        .text-engine { font-size: 12px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; }
        .text-footer { font-size: 11px; font-weight: 900; letter-spacing: 0.4em; text-transform: uppercase; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-6xl w-full glass-panel p-8 md:p-12 shadow-2xl relative">
        
        <div class="flex flex-col items-center justify-center mb-10">
            <div class="flex items-center gap-4 mb-2">
                <svg width="40" height="40" viewBox="0 0 100 100" class="text-sky-400 fill-current">
                    <path d="M75,30 L65,20 L45,40 L55,50 Z M40,55 L30,45 C25,50 22,55 20,62 C18,70 20,78 25,83 C30,88 38,90 46,88 C53,86 58,83 63,78 L53,68 Z M85,40 L75,30 M60,15 L50,5 M20,62 A35,35 0 0 0 10,75 M30,45 A35,35 0 0 0 17,35"/>
                </svg>
                <h1 class="text-4xl md:text-5xl font-black italic tracking-tighter text-white">
                    UnRobotized <span class="text-sky-400">PRO</span>
                </h1>
            </div>
            <p class="text-engine text-slate-400">Neural Humanizer Engine</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            
            <div class="space-y-6">
                <div class="flex gap-3">
                    <button onclick="setMode('directo')" id="btn-directo" class="btn-bevel active flex-1 py-5 rounded-2xl flex flex-col items-center text-action">
                        <span>Directo</span>
                    </button>
                    <button onclick="setMode('curioso')" id="btn-curioso" class="btn-bevel flex-1 py-5 rounded-2xl flex flex-col items-center text-action">
                        <span>Curioso</span>
                    </button>
                    <button onclick="setMode('whatsapp')" id="btn-whatsapp" class="btn-bevel flex-1 py-5 rounded-2xl flex flex-col items-center text-action">
                        <span>WhatsApp</span>
                    </button>
                </div>

                <div class="bg-slate-900/90 rounded-3xl border border-slate-700 p-6 h-72 shadow-inner">
                    <label class="text-[11px] uppercase tracking-widest text-sky-400 font-black mb-4 block">Entrada de Datos</label>
                    <textarea id="inputText" class="w-full h-48 bg-transparent outline-none resize-none text-lg text-slate-200" placeholder="Pega tu mensaje aquí..."></textarea>
                </div>

                <button onclick="checkAndExecute()" class="btn-bevel w-full py-6 bg-sky-500 text-white rounded-2xl text-action">
                    Optimizar con pulso humano
                </button>
            </div>

            <div class="space-y-6 flex flex-col">
                <div class="bg-slate-900/90 rounded-3xl border border-sky-500/30 p-8 min-h-[420px] flex flex-col relative overflow-hidden shadow-inner">
                    <label class="text-action text-sky-400 mb-6 block">Misil Generado</label>
                    
                    <div id="sat-orb" class="sat-loader">
                        <svg viewBox="0 0 100 100" class="text-sky-400 fill-current w-full h-full">
                            <path d="M75,30 L65,20 L45,40 L55,50 Z M40,55 L30,45 M85,40 L75,30 M60,15 L50,5"/>
                        </svg>
                    </div>

                    <div class="flex-1 flex items-start justify-center text-center italic text-slate-100 overflow-y-auto">
                        <p id="outputText" class="text-lg md:text-xl leading-relaxed py-6">Listo para calibrar...</p>
                    </div>
                    
                    <button onclick="copyText()" class="mt-6 bg-white text-black py-4 rounded-xl text-action hover:bg-sky-400 transition-all">
                        Copiar Texto
                    </button>
                </div>

                <div class="bg-slate-900/50 rounded-2xl border border-slate-800 p-5 flex justify-between items-center">
                    <span class="text-engine text-slate-500 italic">Laguna Labs Engine Status</span>
                    <span id="mission-count" class="text-engine text-sky-400 font-black">3/3 DISPONIBLES</span>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center">
            <p class="text-footer opacity-40 text-white">LAGUNA LABS - MCMXLIII. 2026</p>
        </footer>
    </div>

    <script>
        let currentMode = 'directo';
        let missionsLeft = localStorage.getItem('unrobotized_misiones') || 3;
        document.getElementById('mission-count').innerText = `${missionsLeft}/3 DISPONIBLES`;

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.btn-bevel').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
        }

        async function checkAndExecute() {
            const text = document.getElementById('inputText').value;
            if(!text) return;

            document.getElementById('sat-orb').style.display = 'block';
            document.getElementById('outputText').innerText = "CALIBRANDO DESDE EL SATÉLITE...";

            try {
                const res = await fetch('/api/optimize', {
                    method: 'POST',
                    body: JSON.stringify({ text, mode: currentMode }),
                    headers: {'Content-Type': 'application/json'}
                });
                const result = await res.json();
                document.getElementById('sat-orb').style.display = 'none';

                if (result.humanizedText) {
                    document.getElementById('outputText').innerText = result.humanizedText;
                    missionsLeft--;
                    localStorage.setItem('unrobotized_misiones', missionsLeft);
                    document.getElementById('mission-count').innerText = `${missionsLeft}/3 DISPONIBLES`;
                } else {
                    document.getElementById('outputText').innerText = "ERROR: " + (result.error || "Fallo neural.");
                }
            } catch (error) {
                document.getElementById('sat-orb').style.display = 'none';
                document.getElementById('outputText').innerText = "ERROR DE CONEXIÓN.";
            }
        }
        function copyText() { navigator.clipboard.writeText(document.getElementById('outputText').innerText); }
    </script>
</body>
</html>
