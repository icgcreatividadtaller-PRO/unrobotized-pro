<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnRobotized Pro | Precision Action v3.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f8fafc; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        .glass-panel { 
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 1);
            position: relative;
            z-index: 20;
        }

        /* --- BEVEL & EMBOSS TIPO PHOTOSHOP --- */
        .ps-button {
            border-top: 3px solid rgba(255, 255, 255, 0.25);
            border-left: 3px solid rgba(255, 255, 255, 0.25);
            border-right: 3px solid rgba(0, 0, 0, 0.5);
            border-bottom: 3px solid rgba(0, 0, 0, 0.5);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
        }
        .ps-button:active {
            border-top: 3px solid rgba(0, 0, 0, 0.5);
            border-left: 3px solid rgba(0, 0, 0, 0.5);
            border-right: 3px solid rgba(255, 255, 255, 0.1);
            border-bottom: 3px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.98);
        }
        .tone-btn.active {
            background-color: #0ea5e9 !important;
            color: #020617 !important;
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.5);
        }

        .neon-box {
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid rgba(14, 165, 233, 0.4);
            box-shadow: 0 0 30px rgba(14, 165, 233, 0.2);
            border-radius: 1.5rem;
        }

        .halftone-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1;
            background-image: radial-gradient(circle, #0ea5e9 1.5px, transparent 1.5px);
            background-size: 14px 14px;
            mask-image: radial-gradient(circle at bottom right, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%);
            -webkit-mask-image: radial-gradient(circle at bottom right, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%);
            opacity: 0.35;
        }

        /* --- ANIMACIÓN SATÉLITE --- */
        .satellite-orbit {
            width: 50px; height: 50px;
            border: 1px dashed rgba(14, 165, 233, 0.5);
            border-radius: 50%;
            position: relative;
            animation: spin 3s linear infinite;
            display: none;
            margin: 0 auto 15px;
        }
        .satellite-body {
            width: 10px; height: 10px;
            background: #0ea5e9;
            border-radius: 50%;
            position: absolute;
            top: -5px; left: 50%;
            box-shadow: 0 0 15px #0ea5e9;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        textarea { text-align: center; resize: none; }
        ::placeholder { color: #475569 !important; }
    </style>
</head>
<body class="flex items-center justify-center p-2 md:p-4">

    <div class="halftone-bg"></div>

    <div class="max-w-7xl w-full glass-panel rounded-[3rem] p-6 md:p-10">
        
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-extrabold text-white tracking-tighter leading-tight">
                UnRobotized <span class="text-sky-400 italic">PRO</span>
            </h1>
            <p class="text-slate-400 text-xs md:text-sm mt-3 font-light tracking-wide uppercase">
                Transforma mensajes fríos genéricos en aperturas de negocios de alto valor.
            </p>
        </header>

        <div class="grid md:grid-cols-2 gap-8 relative z-30">
            
            <div class="space-y-6 flex flex-col justify-between">
                <div class="space-y-4">
                    <label class="block text-[11px] font-black text-sky-400 uppercase tracking-[0.4em] text-center">Táctica de Apertura</label>
                    <div class="grid grid-cols-3 gap-3">
                        <button id="t-dir" onclick="setTone('directo')" class="tone-btn ps-button active py-4 rounded-xl text-xs md:text-sm font-black uppercase flex flex-col items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4-4-4"/><path d="M3 20h18"/><path d="m3 10 4-4-4-4"/></svg>
                            Directo
                        </button>
                        <button id="t-cur" onclick="setTone('curioso')" class="tone-btn ps-button py-4 rounded-xl text-xs md:text-sm font-black uppercase text-slate-100 flex flex-col items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                            Curioso
                        </button>
                        <button id="t-wha" onclick="setTone('whatsapp')" class="tone-btn ps-button py-4 rounded-xl text-xs md:text-sm font-black uppercase text-slate-100 flex flex-col items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                            WhatsApp
                        </button>
                    </div>
                </div>

                <div class="neon-box p-4">
                    <label class="block text-sm font-black text-slate-100 uppercase tracking-[0.2em] text-center mb-4">
                        Pega tu mensaje original aburrido aquí:
                    </label>
                    <textarea id="inputMsg" rows="5" 
                        class="w-full bg-transparent p-2 text-white font-medium outline-none text-base leading-relaxed" 
                        placeholder="Ej: Hola estimado, quería ofrecerle..."></textarea>
                </div>

                <button id="mainBtn" onclick="optimizar()" class="w-full ps-button bg-gradient-to-r from-indigo-600 to-sky-500 text-white py-6 rounded-2xl font-black text-base uppercase tracking-[0.2em]">
                    Optimizar Mensaje ✨
                </button>
            </div>

            <div id="resPanel" class="neon-box p-8 flex flex-col border border-white/10 h-full relative">
                <div class="text-center border-b border-white/20 pb-6 mb-6">
                    <span class="text-sm font-black text-sky-400 uppercase tracking-[0.4em]">
                        Misil de Ventas Generado
                    </span>
                </div>
                
                <div class="flex-grow flex flex-col items-center justify-center">
                    <div id="satellite" class="satellite-orbit">
                        <div class="satellite-body"></div>
                    </div>
                    
                    <div id="resArea" class="p-2 text-slate-300 italic text-base md:text-lg leading-relaxed text-center overflow-y-auto w-full">
                        Listo para calibrar tu mensaje...
                    </div>
                </div>

                <div class="mt-8 flex justify-center">
                    <button id="copyBtn" onclick="copiar()" class="ps-button bg-slate-100 hover:bg-white text-slate-900 py-3 px-12 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all">
                        Copiar Texto
                    </button>
                </div>
            </div>
        </div>

        <footer class="mt-10 text-center opacity-40">
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-[1.5em]">Precision Platform v3.4 | Neural Link 2026</p>
        </footer>
    </div>

    <script>
        let currentTone = 'directo';

        function setTone(t) {
            currentTone = t;
            ['directo', 'curioso', 'whatsapp'].forEach(id => {
                const btn = document.getElementById('t-' + id.substring(0,3));
                btn.classList.remove('active');
                btn.classList.add('text-slate-100');
            });
            const active = document.getElementById('t-' + t.substring(0,3));
            active.classList.add('active');
            active.classList.remove('text-slate-100');
        }

        async function optimizar() {
            const msg = document.getElementById('inputMsg').value;
            const resArea = document.getElementById('resArea');
            const satellite = document.getElementById('satellite');
            const btn = document.getElementById('mainBtn');
            
            if(!msg) return alert("Pega un mensaje, socio.");

            // Reset UI
            btn.disabled = true;
            satellite.style.display = "block";
            resArea.innerText = "Sincronizando órbita satelital... 🛰️";
            resArea.classList.replace('text-white', 'text-slate-300');

            try {
                // LLAMADA AL MOTOR DE VERCEL
                const response = await fetch('/api/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, tone: currentTone })
                });
                
                const data = await response.json();
                
                resArea.style.fontStyle = "normal";
                resArea.classList.replace('text-slate-300', 'text-white');
                resArea.innerText = data.optimized || data.error;

            } catch (error) {
                resArea.innerText = "Error de enlace. Revisa tu internet o la API Key.";
            } finally {
                btn.disabled = false;
                satellite.style.display = "none";
            }
        }

        function copiar() {
            const texto = document.getElementById('resArea').innerText;
            if(texto.includes("calibrar")) return;
            navigator.clipboard.writeText(texto);
            const copyBtn = document.getElementById('copyBtn');
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "¡COPIADO!";
            setTimeout(() => copyBtn.innerText = originalText, 2000);
        }
    </script>
</body>
</html>
