<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnRobotized Pro | High-Tech Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --dark-blue: #0a0f1d;
            --surface: #162035;
            --shadow-light: rgba(255, 255, 255, 0.1);
            --shadow-dark: rgba(0, 0, 0, 0.6);
        }

        body { 
            font-family: 'Share Tech Mono', monospace; 
            background-color: var(--dark-blue); 
            /* Patrón Halftone */
            background-image: radial-gradient(rgba(0, 242, 255, 0.05) 1.5px, transparent 0);
            background-size: 15px 15px;
            color: white;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
        }

        .container { 
            background: var(--surface); 
            padding: 30px; 
            border-radius: 4px; 
            border: 2px solid #1e293b;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.8);
            width: 100%; 
            max-width: 600px;
            position: relative;
        }

        h1 { 
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            text-align: center;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        textarea { 
            width: 100%; 
            height: 150px; 
            padding: 15px; 
            background: #050810;
            /* Borde Neón */
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue), inset 0 0 5px var(--neon-blue);
            border-radius: 4px;
            color: #ccfaff;
            font-size: 1.1rem; 
            box-sizing: border-box;
            outline: none;
            margin-bottom: 25px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }

        /* Botones Bevel & Emboss (Efecto Photoshop) */
        button { 
            padding: 15px 5px; 
            background: #1a2a4a;
            color: white; 
            border: 1px solid #2d4571;
            border-radius: 4px;
            cursor: pointer; 
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: all 0.1s;
            /* Sombras para el relieve */
            box-shadow: 
                inset 2px 2px 3px var(--shadow-light), 
                inset -2px -2px 3px var(--shadow-dark),
                3px 3px 6px rgba(0,0,0,0.5);
        }

        button:hover {
            background: #253b66;
            transform: translateY(-1px);
        }

        button:active {
            box-shadow: 
                inset -2px -2px 3px var(--shadow-light), 
                inset 2px 2px 3px var(--shadow-dark);
            transform: translateY(1px);
        }

        #result-area { 
            margin-top: 30px; 
            padding: 20px; 
            background: rgba(0, 242, 255, 0.05); 
            border-left: 4px solid var(--neon-blue);
            border-radius: 4px;
            display: none;
        }

        #result { color: #82f9ff; line-height: 1.5; }
        
        .label-tech {
            font-size: 0.7rem;
            color: var(--neon-blue);
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>UnRobotized PRO</h1>
        
        <span class="label-tech">Input_Terminal:</span>
        <textarea id="input" placeholder="INGRESE TEXTO PARA PROCESAR..."></textarea>

        <span class="label-tech">Select_Human_Protocol:</span>
        <div class="button-grid">
            <button onclick="process('curioso')">Curioso</button>
            <button onclick="process('directo')">Directo</button>
            <button onclick="process('whatsapp')">WhatsApp</button>
        </div>

        <div id="result-area">
            <span class="label-tech">Output_Result:</span>
            <div id="result"></div>
        </div>
    </div>

    <script>
        async function process(tone) {
            const text = document.getElementById('input').value;
            const resultArea = document.getElementById('result-area');
            const resultDiv = document.getElementById('result');

            if(!text) return alert("SISTEMA: Ingrese texto para continuar.");
            
            resultArea.style.display = "block";
            resultDiv.innerText = "PROCESANDO PROTOCOLO " + tone.toUpperCase() + "...";
            
            try {
                const response = await fetch('/api/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, tone: tone })
                });
                const data = await response.json();
                resultDiv.innerText = data.optimized || data.error;
            } catch (e) {
                resultDiv.innerText = "ERROR_DE_SISTEMA: Verifique conexión.";
            }
        }
    </script>
</body>
</html>
