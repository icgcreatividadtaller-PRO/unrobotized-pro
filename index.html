<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnRobotized Pro | Tactical Engine v3.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f8fafc; margin: 0; min-height: 100vh; overflow-x: hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 1); position: relative; z-index: 20; }
        .ps-button { border-top: 3px solid rgba(255, 255, 255, 0.2); border-left: 3px solid rgba(255, 255, 255, 0.2); border-right: 3px solid rgba(0, 0, 0, 0.6); border-bottom: 3px solid rgba(0, 0, 0, 0.6); box-shadow: 0 8px 15px rgba(0, 0, 0, 0.5); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .ps-button:active { border-top: 3px solid rgba(0, 0, 0, 0.6); border-left: 3px solid rgba(0, 0, 0, 0.6); border-right: 2px solid rgba(255, 255, 255, 0.1); border-bottom: 2px solid rgba(255, 255, 255, 0.1); transform: scale(0.97); }
        .tone-btn.active { background-color: #0ea5e9 !important; color: #020617 !important; box-shadow: 0 0 25px rgba(14, 165, 233, 0.6); }
        .neon-box { background: rgba(2, 6, 23, 0.8); border: 1px solid rgba(14, 165, 233, 0.3); box-shadow: 0 0 40px rgba(14, 165, 233, 0.1); border-radius: 1.5rem; }
        .halftone-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; background-image: radial-gradient(circle, #0ea5e9 1.5px, transparent 1.5px); background-size: 14px 14px; opacity: 0.3; }
        .satellite-orbit { width: 50px; height: 50px; border: 1px dashed rgba(14, 165, 233, 0.4); border-radius: 50%; position: relative; animation: spin 3s linear infinite; display: none; margin: 0 auto 15px; }
        .satellite-body { width: 10px; height: 10px; background: #0ea5e9; border-radius: 50%; position: absolute; top: -5px; left: 50%; box-shadow: 0 0 15px #0ea5e9; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        textarea { text-align: center; resize: none; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="halftone-bg"></div>

    <div class="max-w-7xl w-full glass-panel rounded-[2.5rem] p-6 md:p-10">
        <header class="text-center mb-8">
            <h1 style="font-family: 'Orbitron', sans-serif;" class="text-4xl md:text-5xl font-black text-white tracking-tighter uppercase italic">
                UnRobotized <span class="text-sky-400">PRO</span>
            </h1>
            <p class="text-slate-400 text-xs md:text-sm mt-3 font-semibold tracking-[0.2em] uppercase max-w-lg mx-auto leading-relaxed">
                Transforma mensajes fríos genéricos en aperturas de negocios de alto valor.
            </p>
        </header>

        <div class="grid md:grid-cols-2 gap-8 relative z-30">
            <div class="space-y-6 flex flex-col justify-between">
                <div class="space-y-4">
                    <label class="block text-[11px] font-black text-sky-400 uppercase tracking-[0.4em] text-center">Seleccionar Protocolo</label>
                    <div class="grid grid-cols-3 gap-3">
                        <button id="btn-dir" onclick="setTone('directo')" class="tone-btn ps-button active py-4 rounded-xl text-[10px] font-black uppercase flex flex-col items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4-4-4"/><path d="M3 20h18"/><path d="m3 10 4-4-4-4"/></svg>
                            Directo
                        </button>
                        <button id="btn-cur" onclick="setTone('curioso')" class="tone-btn ps-button py-4 rounded-xl text-[10px] font-black uppercase text-slate-100 flex flex-col items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                            Curioso
                        </button>
                        <button id="btn-wha" onclick="setTone('whatsapp')" class="tone-btn ps-button py-4 rounded-xl text-[10px] font-black uppercase text-slate-100 flex flex-col items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                            WhatsApp
                        </button>
                    </div>
                </div>

                <div class="neon-box p-6">
                    <label class="block text-xs md:text-sm font-black text-slate-100 uppercase tracking-[0.2em] text-center mb-4">
                        Pega tu mensaje original aburrido aquí:
                    </label>
                    <textarea id="inputField" rows="5" class="w-full bg-transparent p-2 text-white font-medium outline-none text-base" placeholder="Ej: Hola estimado, quería ofrecerle..."></textarea>
                </div>

                <button id="mainBtn" onclick="optimizar()" class="w-full ps-button bg-gradient-to-r from-blue-700 to-sky-500 text-white py-6 rounded-2xl font-black text-sm uppercase tracking-[0.3em]">
                    Inyectar Inteligencia ⚡
                </button>
            </div>

            <div id="resPanel" class="neon-box p-8 flex flex-col border border-white/5 h-full relative">
                <div class="text-center border-b border-white/10 pb-6 mb-6">
                    <span class="text-xs md:text-sm font-black text-sky-400 uppercase tracking-[0.4em]">Misil de Ventas Generado</span>
                </div>
                <div class="flex-grow flex flex-col items-center justify-center">
                    <div id="satellite" class="satellite-orbit"><div class="satellite-body"></div></div>
                    <div id="outputArea" class="p-2 text-slate-400 italic text-base md:text-lg text-center w-full">Listo para calibrar tu mensaje...</div>
                </div>
                <div class="mt-8 flex justify-center">
                    <button id="copyBtn" onclick="copiar()" class="ps-button bg-slate-100 text-slate-900 py-3 px-12 rounded-xl font-black text-[10px] uppercase tracking-widest">Copiar Misil</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTone = 'directo';

        function setTone(t) {
            console.log("Cambiando protocolo a:", t);
            currentTone = t;
            ['dir', 'cur', 'wha'].forEach(id => {
                const btn = document.getElementById('btn-' + id);
                btn.classList.remove('active');
                btn.classList.add('text-slate-100');
            });
            const activeId = 'btn-' + t.substring(0,3);
            document.getElementById(activeId).classList.add('active');
            document.getElementById(activeId).classList.remove('text-slate-100');
        }

        async function optimizar() {
            const input = document.getElementById('inputField');
            const output = document.getElementById('outputArea');
            const sat = document.getElementById('satellite');
            const btn = document
