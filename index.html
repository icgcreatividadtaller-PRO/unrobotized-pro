<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnRobotized PRO | Laguna Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background-color: #050a18; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            position: relative;
        }

        /* 1. EFECTO HALF-TONE AGRESIVO DIAGONAL (Punto 4) */
        /* Se genera desde la esquina inferior derecha hacia la superior izquierda */
        .halftone-bg {
            position: fixed;
            bottom: 0; right: 0;
            width: 100%; height: 100%;
            background-image: radial-gradient(rgba(34, 211, 238, 0.35) 4px, transparent 4px);
            background-size: 20px 20px;
            mask-image: linear-gradient(225deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%);
            -webkit-mask-image: linear-gradient(225deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
            z-index: 1;
        }

        .glass-panel { 
            background: rgba(15, 23, 42, 0.96); 
            backdrop-filter: blur(30px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 2.5rem; 
            z-index: 10;
            position: relative;
        }

        /* 2. BEVEL & EMBOSS PROFUNDO (Punto 5) */
        .btn-bevel-pro {
            background: #1e293b;
            border-top: 3px solid rgba(255, 255, 255, 0.4);
            border-left: 2px solid rgba(255, 255, 255, 0.2);
            border-bottom: 8px solid rgba(0, 0, 0, 0.9);
            border-right: 5px solid rgba(0, 0, 0, 0.7);
            box-shadow: inset 2px 2px 4px rgba(255, 255, 255, 0.1), 0 15px 35px rgba(0,0,0,0.6);
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-bevel-pro:active {
            border-top: 8px solid rgba(0, 0, 0, 0.9);
            border-left: 5px solid rgba(0, 0, 0, 0.7);
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            border-right: 2px solid rgba(255, 255, 255, 0.1);
            transform: translateY(5px);
        }
        .btn-bevel-pro.active {
            background: #22d3ee;
            color: #000;
            border-top-color: rgba(255,255,255,0.7);
            border-bottom-color: #0891b2;
            box-shadow: 0 0 40px rgba(34, 211, 238, 0.6), inset 2px 2px 6px rgba(255,255,255,0.9);
        }

        /* 3. SATÉLITE REALISTA EN ÓRBITA (Punto 3) */
        @keyframes high-orbit {
            from { transform: rotate(0deg) translateX(80px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(80px) rotate(-360deg); }
        }
        .orbit-ring {
            display: none;
            position: absolute;
            top: 80px; left: 50%;
            width: 160px; height: 160px;
            border: 2px dashed rgba(34, 211, 238, 0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
        }
        .satellite-unit {
            position: absolute;
            top: 50%; left: 50%;
            width: 45px; height: 45px;
            margin-top: -22.5px; margin-left: -22.5px;
            animation: high-orbit 6s linear infinite;
        }

        /* 4. RECUADROS FLOTANTES CIAN (Punto 3) */
        .cyan-box-pro {
            background: rgba(10, 15, 28, 0.98);
            border: 2px solid rgba(34, 211, 238, 0.5);
            filter: drop-shadow(0 0 20px rgba(34, 211, 238, 0.25));
        }

        /* TIPOGRAFÍA RECALIBRADA (Punto 4) */
        .text-action { font-size: 14px; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; }
        .text-label-pro { font-size: 17px; font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase; }
        .text-footer-pro { font-size: 11px; font-weight: 900; letter-spacing: 0.45em; text-transform: uppercase; }
        
        /* Ajuste de título para móviles (Punto 6) */
        .title-responsive {
            font-size: clamp(1.5rem, 6vw, 4.5rem);
            line-height: 1;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-10">

    <div class="halftone-bg"></div>

    <div class="max-w-6xl w-full glass-panel p-8 md:p-14 shadow-2xl relative overflow-hidden">
        
        <div class="flex flex-col items-center justify-center mb-12 relative z-30">
            <div class="flex items-center gap-5 mb-5">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" class="text-cyan-400 drop-shadow-[0_0_12px_rgba(34,211,238,0.7)]">
                    <rect x="2" y="9" width="4" height="6" rx="1" fill="currentColor"/>
                    <rect x="18" y="9" width="4" height="6" rx="1" fill="currentColor"/>
                    <path d="M6 12H18M12 6V18" stroke="currentColor" stroke-width="2.5"/>
                    <path d="M8 8.5L12 5L16 8.5V15.5L12 19L8 15.5V8.5Z" fill="currentColor" fill-opacity="0.2" stroke="currentColor" stroke-width="2"/>
                    <circle cx="12" cy="12" r="2.5" fill="white"/>
                </svg>
                <h1 class="title-responsive font-black italic tracking-tighter text-white whitespace-nowrap">
                    UnRobotized <span class="text-cyan-400">PRO</span>
                </h1>
            </div>
            
            <div class="text-center space-y-2">
                <p class="text-[11px] sm:text-sm font-bold uppercase tracking-[0.25em] text-slate-300 px-2">
                    TRANSFORMA MENSAJES FRIOS EN APERTURAS DE ALTO VALOR
                </p>
                <p class="text-[10px] font-black uppercase tracking-[0.4em] text-cyan-500/90">Neural Humanizer Engine</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 relative z-30">
            
            <div class="space-y-8">
                <div class="flex flex-col sm:flex-row gap-5 w-full">
                    <button onclick="setMode('directo')" id="btn-directo" class="btn-bevel-pro active flex-1 py-6 rounded-2xl flex items-center justify-center gap-3 text-action">
                        <span class="text-2xl font-black">↑</span>
                        <span>Directo</span>
                    </button>
                    <button onclick="setMode('curioso')" id="btn-curioso" class="btn-bevel-pro flex-1 py-6 rounded-2xl flex items-center justify-center gap-3 text-action">
                        <span class="text-2xl text-cyan-400">?</span>
                        <span>Curioso</span>
                    </button>
                    <button onclick="setMode('whatsapp')" id="btn-whatsapp" class="btn-bevel-pro flex-1 py-6 rounded-2xl flex items-center justify-center gap-3 text-action">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38c1.45.79 3.08 1.21 4.74 1.21 5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.816 9.816 0 0 0 12.04 2z"/></svg>
                        <span>WhatsApp</span>
                    </button>
                </div>

                <div class="cyan-box-pro rounded-[2.5rem] p-8 h-80 relative">
                    <label class="text-label-pro text-cyan-400 mb-6 block text-center w-full">Entrada de Texto</label>
                    <textarea id="inputText" class="w-full h-52 bg-transparent outline-none resize-none text-xl text-slate-200 text-center placeholder-slate-600" placeholder="Pega tu mensaje frío aquí..."></textarea>
                </div>

                <button onclick="checkAndExecute()" class="btn-bevel-pro w-full py-7 bg-cyan-500 text-white rounded-2xl text-action">
                    Optimizar con pulso humano
                </button>
            </div>

            <div class="space-y-8 flex flex-col">
                <div class="cyan-box-pro rounded-[2.5rem] p-10 min-h-[500px] flex flex-col relative overflow-hidden">
                    <label class="text-label-pro text-cyan-400 mb-10 block text-center w-full">Misil Generado</label>
                    
                    <div id="sat-orbit-system" class="orbit-ring">
                        <div class="satellite-unit">
                            <svg viewBox="0 0 24 24" fill="none" class="text-cyan-400 drop-shadow-[0_0_15px_rgba(34,211,238,1)]">
                                <rect x="2" y="9" width="4" height="6" rx="1" fill="currentColor"/>
                                <rect x="18" y="9" width="4" height="6" rx="1" fill="currentColor"/>
                                <path d="M8 8.5L12 5L16 8.5V15.5L12 19L8 15.5V8.5Z" fill="currentColor"/>
                                <circle cx="12" cy="12" r="2.5" fill="white"/>
                            </svg>
                        </div>
                    </div>

                    <div class="flex-1 flex items-start justify-center text-center italic text-slate-100 overflow-y-auto pt-16">
                        <p id="outputText" class="text-xl md:text-2xl leading-relaxed py-8">Listo para el lanzamiento...</p>
                    </div>
                    
                    <button onclick="copyText()" class="btn-bevel-pro mt-8 bg-white text-black py-5 rounded-xl text-action">
                        Copiar Texto
                    </button>
                </div>

                <div class="bg-slate-900/70 rounded-2xl border border-slate-800 p-6 flex justify-between items-center relative z-40">
                    <span class="text-[12px] uppercase tracking-widest text-slate-500 italic">Laguna Labs Status</span>
                    <span id="mission-count" class="text-[12px] font-black text-cyan-400">1/3 DISPONIBLES</span>
                </div>
            </div>
        </div>

        <footer class="mt-16 text-center relative z-40">
            <p class="text-footer-pro opacity-40 text-white">LAGUNA LABS - MCMXLIII. 2026</p>
        </footer>
    </div>

    <script>
        let currentMode = 'directo';
        let missionsLeft = localStorage.getItem('unrobotized_misiones') || 3;
        document.getElementById('mission-count').innerText = `${missionsLeft}/3 DISPONIBLES`;

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.btn-bevel-pro').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
        }

        async function checkAndExecute() {
            const text = document.getElementById('inputText').value;
            if(!text) return;

            document.getElementById('sat-orbit-system').style.display = 'block';
            document.getElementById('outputText').innerText = "CALIBRANDO DESDE EL SATÉLITE...";

            try {
                const res = await fetch('/api/optimize', {
                    method: 'POST',
                    body: JSON.stringify({ text, mode: currentMode }),
                    headers: {'Content-Type': 'application/json'}
                });
                const result = await res.json();
                document.getElementById('sat-orbit-system').style.display = 'none';

                if (result.humanizedText) {
                    document.getElementById('outputText').innerText = result.humanizedText;
                    missionsLeft--;
                    localStorage.setItem('unrobotized_misiones', missionsLeft);
                    document.getElementById('mission-count').innerText = `${missionsLeft}/3 DISPONIBLES`;
                } else {
                    document.getElementById('outputText').innerText = "ERROR NEURAL: " + (result.error || "Fallo en el satélite.");
                }
            } catch (error) {
                document.getElementById('sat-orbit-system').style.display = 'none';
                document.getElementById('outputText').innerText = "ERROR DE CONEXIÓN.";
            }
        }
        function copyText() { navigator.clipboard.writeText(document.getElementById('outputText').innerText); }
    </script>
</body>
</html>
