<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnRobotized Pro | Humaniza tu comunicación</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { color: #2c3e50; font-size: 1.5rem; margin-bottom: 1rem; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 8px; margin-top: 1rem; cursor: pointer; font-size: 1rem; }
        button:hover { background: #219150; }
        #result { margin-top: 1.5rem; padding: 1rem; background: #e8f4fd; border-radius: 8px; color: #34495e; min-height: 50px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>UnRobotized Pro 🚀</h1>
        <p>Pega tu texto y deja que la IA lo haga sonar humano.</p>
        <textarea id="input" placeholder="Escribe aquí tu mensaje..."></textarea>
        <button onclick="process()">UnRobotizar Mensaje</button>
        <div id="result">El resultado aparecerá aquí...</div>
    </div>

    <script>
        async function process() {
            const text = document.getElementById('input').value;
            const resultDiv = document.getElementById('result');
            if(!text) return alert("Escribe algo primero");
            
            resultDiv.innerText = "Procesando...";
            
            try {
                const response = await fetch('/api/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, tone: 'profesional y humano' })
                });
                const data = await response.json();
                resultDiv.innerText = data.optimized || data.error;
            } catch (e) {
                resultDiv.innerText = "Error de conexión.";
            }
        }
    </script>
</body>
</html>
